name: Daily SM Data Update

on:
  schedule:
    - cron: '30 8 * * *'
  workflow_dispatch:

# 加这行环境变量，彻底消除 Node.js 的烦人警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install akshare pandas

    - name: Run Daily Update Script
      run: python update_daily.py

    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add sm_research_db/*.csv
        
        # 终极安全提交法：如果有更新就提交，如果没有更新就跳过(不抛出错误码)
        git commit -m "Auto-update SM data: $(date +'%Y-%m-%d')" || true
        git push || true