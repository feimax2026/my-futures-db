name: Daily SM Data Update

on:
  schedule:
    # 设定在每天北京时间 16:30 执行 (UTC 时间 08:30)
    # 期货市场下午 15:00 收盘，16:30 数据绝对已经更新完毕
    - cron: '30 8 * * *'
  workflow_dispatch: # 保留手动触发按钮

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12' # 匹配你本地的版本

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install akshare pandas

    - name: Run Daily Update Script
      run: python update_daily.py

    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add sm_research_db/*.csv
        # 只有在有新数据变动时才提交，否则跳过
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update SM data: $(date +'%Y-%m-%d')" && git push)