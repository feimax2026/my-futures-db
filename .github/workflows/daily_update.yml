name: Daily SM Data Update

on:
  schedule:
    # 每天北京时间 16:30 运行 (UTC 时间 08:30)
    # 格式是: 分 时 天 月 周
    - cron: '30 8 * * *'
  workflow_dispatch: # 允许你手动点击按钮触发运行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: 安装依赖库
      run: |
        pip install akshare pandas

    - name: 运行抓取脚本
      run: |
        python sm_collector.py

    - name: 提交并推送数据更新
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add sm_futures_data.csv
        git commit -m "自动更新锰硅数据: $(date)" || echo "没有新数据可更新"
        git push